apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: quackops
spec:
  version: v2.2.0
  homepage: https://github.com/mikhae1/kubectl-quackops
  shortDescription: AI-powered kubectl plugin for Kubernetes troubleshooting
  description: |
    QuackOps is a kubectl plugin that opens an interactive AI assistant to
    help you diagnose and resolve Kubernetes issues. It keeps session
    context, can suggest commands, and supports local or cloud LLM providers.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/mikhae1/kubectl-quackops/releases/download/v2.2.0/kubectl-quackops-linux-amd64.tar.gz
    sha256: c8e36b1f6f56d635f4a76c2557a4db44dfb30dd416a8c98e5fa8a3e3bafeea8c
    bin: kubectl-quackops
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/mikhae1/kubectl-quackops/releases/download/v2.2.0/kubectl-quackops-linux-arm64.tar.gz
    sha256: d70ef001be84e30b02a9fd1e4d8339c50a1f3dcf7608ab2f4b3cf5071a4356a4
    bin: kubectl-quackops
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/mikhae1/kubectl-quackops/releases/download/v2.2.0/kubectl-quackops-darwin-amd64.tar.gz
    sha256: a6995a2a357949850c51adff01197f49d2aefcaf0d5b504b224034b827365b39
    bin: kubectl-quackops
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/mikhae1/kubectl-quackops/releases/download/v2.2.0/kubectl-quackops-darwin-arm64.tar.gz
    sha256: 4803d075dd580f39bb6c0e218763e5f3979508a35bed82213bd5a82c67ff8a01
    bin: kubectl-quackops
